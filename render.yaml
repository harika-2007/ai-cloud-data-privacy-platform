###############################################################################
# Render Blueprint – Infrastructure-as-Code for the Privacy Platform
#
# Defines the backend web service and PostgreSQL database.
# Apply with:  render blueprint apply
# Or connect this repo to Render for automatic deployment.
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # Backend API – FastAPI application
  # ---------------------------------------------------------------------------
  - type: web
    name: privacy-platform-backend
    env: python
    region: oregon
    plan: starter

    buildCommand: |
      cd backend
      pip install -r requirements.txt

    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /api/v1/health

    envVars:
      - key: APP_NAME
        value: Privacy Compliance Platform
      - key: APP_VERSION
        value: "1.0.0"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: privacy-platform-db
          property: connectionString
      - key: DATABASE_SYNC_URL
        fromDatabase:
          name: privacy-platform-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://privacy-platform.vercel.app
      - key: OLLAMA_BASE_URL
        value: http://ollama:11434  # Or your hosted Ollama endpoint
      - key: AI_ENABLED
        value: "true"
      - key: DLP_ENABLED
        value: "true"
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: PUBSUB_ENABLED
        value: "false"
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: privacy-platform-db
    region: oregon
    plan: starter
    databaseName: privacy_platform
    ipAllowList: []
