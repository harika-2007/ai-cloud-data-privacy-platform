server {
    listen 80;
    server_name _;  # Accept any hostname (localhost, ngrok, production domain)

    # Serve static files from the built React app
    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────
    # Security headers
    # ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────
    # CORS headers for cross-origin API requests
    # These are set at the nginx level for cases where
    # the API is accessed from a different origin.
    # ──────────────────────────────────────────────
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, Origin, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "600" always;

    # ──────────────────────────────────────────────
    # Backend API proxy — forward /api/ requests
    # ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # Critical for ngrok HTTPS
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Allow large uploads
        client_max_body_size 50M;

        # Increase timeouts for long-running scan operations
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ──────────────────────────────────────────────
    # SPA fallback — serve index.html for all non-file routes
    # ──────────────────────────────────────────────
    location / {
        # Handle CORS preflight (OPTIONS) requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, Origin, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age "600";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────
    # Cache static assets aggressively
    # ──────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ──────────────────────────────────────────────
    # Deny access to hidden files
    # ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ──────────────────────────────────────────────
    # Gzip compression
    # ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
