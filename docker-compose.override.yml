# Docker Compose override for local development.
# This file is automatically merged with docker-compose.yml when running:
#   docker compose up
#
# For ngrok testing, set NGROK_URL before starting:
#   docker compose run --rm backend sh -c "echo NGROK_URL=https://your-ngrok-url.ngrok-free.app >> .env"
#   $env:NGROK_URL="https://your-ngrok-url.ngrok-free.app"; docker compose up
#
# For production deployment, use:
#   docker compose -f docker-compose.yml up

services:
  backend:
    volumes:
      # Mount source code for hot reload with uvicorn --reload
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs:/app/logs
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://127.0.0.1:3000,http://127.0.0.1:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      args:
        VITE_API_URL: ""  # Uses relative URLs through nginx proxy
    ports:
      - "3000:80"
    volumes:
      # Mount source for hot reload when using Vite dev server
      - ./frontend:/app
      - /app/node_modules

  postgres:
    ports:
      - "5432:5432"

  ollama:
    profiles:
      - ai

  nginx:
    ports:
      - "80:80"
