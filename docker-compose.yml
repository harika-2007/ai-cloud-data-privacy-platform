services:
  postgres:
    image: postgres:16-alpine
    container_name: privacy-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-privacy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privacy_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-privacy_platform}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-privacy_user} -d ${POSTGRES_DB:-privacy_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - privacy-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: privacy-backend
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/reports
      - logs_data:/app/logs
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-privacy_user}:${POSTGRES_PASSWORD:-privacy_pass_2024}@postgres:5432/${POSTGRES_DB:-privacy_platform}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production-2024}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      UPLOAD_DIR: /app/uploads
      REPORT_DIR: /app/reports
      CORS_ORIGINS: http://localhost:3000,http://localhost,http://localhost:5173
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - privacy-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: privacy-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - privacy-network

  nginx:
    image: nginx:alpine
    container_name: privacy-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - privacy-network

  ollama:
    image: ollama/ollama:latest
    container_name: privacy-ollama
    restart: unless-stopped
    profiles:
      - ai
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - privacy-network

volumes:
  postgres_data:
  uploads_data:
  reports_data:
  logs_data:
  ollama_data:

networks:
  privacy-network:
    driver: bridge
