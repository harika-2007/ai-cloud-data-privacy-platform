server {
    listen 80;
    server_name _;  # Accept any hostname (localhost, ngrok, production domain)

    # ──────────────────────────────────────────────
    # Security headers
    # ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Increase max body size for file uploads
    client_max_body_size 50M;

    # ──────────────────────────────────────────────
    # Frontend SPA — proxy to the frontend nginx container
    # ──────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Don't buffer; stream to the client
        proxy_buffering off;
    }

    # ──────────────────────────────────────────────
    # Backend API proxy
    # ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for long-running scan operations
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # ──────────────────────────────────────────────
    # Backend API docs
    # ──────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend:8000/docs;
    }

    location /redoc {
        proxy_pass http://backend:8000/redoc;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # ──────────────────────────────────────────────
    # Health check endpoint
    # ──────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000/api/v1/health;
    }
}
